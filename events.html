    <h1>Upcoming Events & Workshops</h1>

    <p>
        Join us for hands‑on classes, community gatherings, and seasonal workshops designed to help
        gardeners of all ages learn and grow.
    </p>

    <h2>Register for an Event</h2>

    <form>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="event">Choose an Event:</label><br>
        <select id="event" name="event">
            <option>Organic Gardening Basics</option>
            <option>Houseplant Care 101</option>
            <option>Build Your Own Herb Garden</option>
            <option>Kids’ Nature Workshop</option>
        </select><br><br>

        <input type="submit" value="Register">
    </form>
